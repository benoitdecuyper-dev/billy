<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ec7a1e" />
  <title>Billy — prototype temps réel (Modèle A)</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <style>
    .coulisses{position:fixed;left:0;right:0;bottom:0;background:#2c2533;color:#eee;font-size:.8rem;
      padding:.7rem 1rem calc(.7rem + env(safe-area-inset-bottom));max-height:42vh;overflow:auto;z-index:20;}
    .coulisses h3{margin:.2rem 0;color:#ffb15c;font-size:.8rem;letter-spacing:.03em;}
    .coulisses .line{margin:.25rem 0;line-height:1.4;}
    .coulisses .k{color:#ffb15c;} .coulisses .ok{color:#7fe0a0;} .coulisses .src{color:#9fb6ff;}
    .badge2{position:fixed;top:calc(.7rem + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
      background:#2c2533;color:#ffb15c;font-size:.72rem;font-weight:700;padding:.25rem .7rem;border-radius:999px;z-index:21;}
  </style>
</head>
<body>
  <main class="app" data-state="idle" role="main">
    <div class="badge2">prototype TEMPS RÉEL · Modèle A · 0 crédit</div>

    <div class="start" id="start">
      <img class="start__billy" src="/assets/billy.png" alt="Billy" />
      <p class="start__txt">Démo temps réel : Billy écoute et <b>rebondit sur tes mots</b> — sans jamais inventer de question.</p>
      <button class="start__btn" id="startBtn">Commencer 🌰</button>
      <p class="start__legal">Voix navigateur pour la relance live (la vraie voix Chloé = ElevenLabs en prod). Contenu neutre.</p>
    </div>

    <figure class="billy" id="billy" aria-label="Billy">
      <span class="ring"></span><span class="ring"></span><span class="ring"></span>
      <img class="frame frame-closed" src="/assets/billy.png" alt="Billy" />
      <img class="frame frame-talk" src="/assets/billy-talk.png" alt="" aria-hidden="true" />
    </figure>
  </main>

  <div class="coulisses" id="coulisses" hidden>
    <h3>🔬 Coulisses (ce que voit l'équipe, pas l'enfant)</h3>
    <div id="log"></div>
  </div>

  <script type="module">
    import { evaluate } from '/lib/antiSuggestion.js';

    // --- Répertoire fixe (audios chaleureux déjà générés : 0 crédit) ---
    const OPEN = { audio: 'a4', text: "Raconte-moi ce que tu aimes faire. Prends ton temps." }; // invitation d'ouverture
    const FIXED_RELANCES = [
      { audio: 'f1', text: "Et après ?" },
      { audio: 'f2', text: "Dis-m'en plus." },
    ];
    const SILENCE = { audio: 'silence', text: "Prends ton temps. Je t'écoute." };
    const CLOSE = { audio: 'a5', text: "Merci de m'avoir parlé. J'étais contente de t'écouter. On s'arrête là pour la démonstration." };

    const STOP = ['le','la','les','un','une','des','de','du','et','ou','je','tu','il','on','mon','ma','mes','ton','ta',
      'avec','pour','dans','sur','au','aux','c','est','j','ai','a','que','qui','quoi','moi','toi','se','ce','cet','cette',
      'puis','aussi','tres','bien','fait','faire','jour','hier','matin','soir','apres','quand','comme'];
    const TABOU = ['zizi','zezette','sexe','penis','vagin','fesse','fesses','toucher','touche','frapper','taper'];

    const app=document.querySelector('.app'), billy=document.getElementById('billy');
    const start=document.getElementById('start'), startBtn=document.getElementById('startBtn');
    const coulisses=document.getElementById('coulisses'), logEl=document.getElementById('log');
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    let frVoice=null, flap=null, childWords=new Set(), turn=0, relanceIdx=0;

    function setState(s){app.dataset.state=s;}
    function log(html){const d=document.createElement('div');d.className='line';d.innerHTML=html;logEl.prepend(d);}
    function pickVoice(){const v=speechSynthesis.getVoices().filter(x=>/^fr/i.test(x.lang));
      frVoice=v.find(x=>/google|natural|naturel/i.test(x.name))||v[0]||null;}
    if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}

    function startFlap(){stopFlap();flap=setInterval(()=>billy.classList.toggle('open'),140);}
    function stopFlap(){if(flap){clearInterval(flap);flap=null;}billy.classList.remove('open');}

    // Voix chaleureuse pré-enregistrée (fixe)
    function speakWarm(line){return new Promise(res=>{setState('speaking');startFlap();
      const a=new Audio('/assets/audio/'+line.audio+'.mp3');const d=()=>{stopFlap();res();};a.onended=d;a.onerror=d;a.play().catch(d);});}
    // Voix live navigateur (relance dynamique)
    function speakLive(text){return new Promise(res=>{setState('speaking');startFlap();
      if(!('speechSynthesis'in window)){stopFlap();res();return;}
      const u=new SpeechSynthesisUtterance(text);u.lang='fr-FR';if(frVoice)u.voice=frVoice;u.rate=.92;u.pitch=1.08;
      u.onend=()=>{stopFlap();res();};u.onerror=()=>{stopFlap();res();};speechSynthesis.cancel();speechSynthesis.speak(u);});}

    function listen(){return new Promise(res=>{setState('listening');
      if(!SR){setTimeout(()=>res(''),3000);return;}
      const r=new SR();r.lang='fr-FR';r.interimResults=true;r.continuous=true;let txt='',endT=null;
      r.onresult=e=>{txt=Array.from(e.results).map(x=>x[0].transcript).join(' ').trim();
        if(endT)clearTimeout(endT);endT=setTimeout(()=>{try{r.stop();}catch{}}, 2600);};
      r.onerror=()=>{};r.onend=()=>res(txt);try{r.start();}catch{res('');}});}

    // --- MODÈLE A : choisir la réponse à partir des MOTS DE L'ENFANT, jamais inventer ---
    function chooseRelance(transcript){
      transcript.toLowerCase().split(/[^a-zàâçéèêëîïôûùü']+/).forEach(w=>{if(w.length>2)childWords.add(w);});
      const words=transcript.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').split(/[^a-z']+/).filter(Boolean);
      // mot de contenu de l'enfant, ni vide ni outil ni tabou
      const kw=words.reverse().find(w=>w.length>3 && !STOP.includes(w) && !TABOU.includes(w));
      if(kw){
        const text=`Tu as parlé de ${kw}. Raconte-moi.`;
        return { kind:'cued', text, kw, voice:'live' };
      }
      const r=FIXED_RELANCES[relanceIdx++ % FIXED_RELANCES.length];
      return { kind:'fixe', text:r.text, audio:r.audio, voice:'warm' };
    }

    async function loop(){
      await speakWarm(OPEN);
      log(`Billy (ouverture) : « ${OPEN.text} »`);
      while(turn<3){
        const heard=await listen();
        if(!heard){ await speakWarm(SILENCE); log('— silence — Billy invite doucement.'); continue; }
        log(`👂 Enfant : « <b>${heard}</b> »`);
        const r=chooseRelance(heard);
        // GARDE-FOU : le filtre anti-suggestion valide la relance AVANT de la dire
        const verdict=evaluate(r.text,{childLexicon:childWords,lastChildUtterance:heard});
        if(verdict.decision==='BLOCK'){
          log(`🛑 Filtre BLOCK (${verdict.ruleId}) → on retombe sur une relance ouverte sûre.`);
          const safe=FIXED_RELANCES[relanceIdx++%FIXED_RELANCES.length];
          await speakWarm(safe); log(`Billy : « ${safe.text} » <span class="src">[fixe · voix chaleureuse]</span>`);
        } else if(r.voice==='live'){
          log(`🧠 Modèle A : reprend le mot <span class="k">« ${r.kw} »</span> de l'enfant — filtre <span class="ok">PASS</span>`);
          await speakLive(r.text); log(`Billy : « ${r.text} » <span class="src">[relance dynamique · voix live]</span>`);
        } else {
          await speakWarm(r); log(`Billy : « ${r.text} » <span class="src">[fixe · voix chaleureuse]</span>`);
        }
        turn++;
      }
      await speakWarm(CLOSE); log('Billy (clôture).'); setState('idle');
      start.hidden=false; startBtn.textContent='Recommencer 🌰';
    }

    startBtn.addEventListener('click',()=>{
      start.hidden=true; coulisses.hidden=false; turn=0; childWords=new Set(); relanceIdx=0; logEl.innerHTML='';
      loop();
    });
  </script>
</body>
</html>
