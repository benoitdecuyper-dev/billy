<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#7c6cf0" />
  <title>Billy — démo</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <main class="app" data-state="idle" role="main">

    <div class="demo-badge" title="Démonstration d'expérience — contenu neutre uniquement">DÉMO · contenu neutre</div>

    <!-- Avatar Billy -->
    <figure class="billy" aria-label="Billy">
      <div class="billy__face">
        <span class="billy__eye"></span>
        <span class="billy__eye"></span>
        <span class="billy__smile"></span>
        <!-- ondes d'écoute -->
        <span class="billy__wave"></span>
        <span class="billy__wave"></span>
        <span class="billy__wave"></span>
      </div>
      <figcaption class="billy__name">Billy</figcaption>
    </figure>

    <!-- Bulle de ce que dit Billy (sous-titres) -->
    <p class="bubble" id="subtitle" aria-live="polite">…</p>

    <!-- Indicateur d'état -->
    <p class="status" id="status">Appuie sur le bouton pour commencer</p>

    <!-- Commande principale -->
    <div class="controls">
      <button class="mic" id="micBtn" type="button">
        <span class="mic__icon">🎤</span>
        <span class="mic__label" id="micLabel">Commencer</span>
      </button>
      <button class="stop" id="stopBtn" type="button" hidden>Arrêter</button>
    </div>

    <!-- Repli clavier si la voix n'est pas dispo -->
    <form class="fallback" id="fallbackForm" hidden>
      <input id="fallbackInput" type="text" autocomplete="off"
             placeholder="Écris ta réponse à Billy…" aria-label="Réponse à Billy" />
      <button type="submit">Envoyer</button>
    </form>

    <p class="disclaimer">
      Billy est un personnage, pas une vraie personne. Ceci est une démonstration.
      En cas de danger, un adulte peut appeler le <strong>119</strong> (gratuit, 24h/24).
    </p>
  </main>

  <script src="/js/app.js"></script>
</body>
</html>
