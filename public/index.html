<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ec7a1e" />
  <title>Billy</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    :root{--orange:#ec7a1e;--orange-l:#ffb15c;--ink:#4f4438;--muted:#998a78;}
    *{box-sizing:border-box;} html,body{height:100%;}
    body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;color:var(--ink);
      background:radial-gradient(120% 70% at 50% -10%,#fff,#fff2e3 45%,#ffe7d2);
      min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:1rem;text-align:center;padding:2rem 1.4rem calc(2rem + env(safe-area-inset-bottom));}
    .billy{width:160px;height:auto;animation:breathe 4s ease-in-out infinite;}
    @keyframes breathe{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
    h1{color:var(--orange);font-size:2rem;margin:.2rem;}
    .tag{color:var(--ink);max-width:30ch;line-height:1.5;margin:.2rem 0 1rem;}
    .cta{display:block;width:100%;max-width:340px;border:none;text-decoration:none;
      background:linear-gradient(180deg,var(--orange-l),var(--orange));color:#fff;font-size:1.15rem;font-weight:800;
      padding:1.1rem;border-radius:999px;box-shadow:0 12px 26px rgba(236,122,30,.4);}
    .links{display:flex;flex-direction:column;gap:.5rem;margin-top:.4rem;}
    .links a{color:var(--muted);font-size:.9rem;}
    .note{font-size:.78rem;color:var(--muted);max-width:34ch;line-height:1.45;margin-top:.8rem;}
  </style>
</head>
<body>
  <img class="billy" src="/assets/billy.png" alt="Billy l'écureuil" />
  <h1>Billy</h1>
  <p class="tag">Un petit écureuil tout doux qui écoute l'enfant, et oriente l'adulte vers les bonnes personnes.</p>

  <a class="cta" href="/adulte.html">Espace adulte — commencer 🌰</a>

  <div class="links">
    <a href="/demo.html">▶︎ Voir la démo (voix + animations)</a>
    <a href="/v2.html">Prototypes & outils</a>
  </div>

  <p class="note">Prototype — contenu neutre, à valider par des professionnels avant tout usage réel.</p>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
  </script>
</body>
</html>
