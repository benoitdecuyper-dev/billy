<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ec7a1e" />
  <title>Billy — séance</title>
  <style>
    :root { --orange:#ec7a1e; --ink:#4f4438; --muted:#998a78; --ok:#6bbf8a; }
    *{box-sizing:border-box;} body{margin:0;font-family:"Segoe UI",system-ui,sans-serif;color:var(--ink);
      background:radial-gradient(120% 70% at 50% -10%,#fff,#fff2e3 45%,#ffe7d2);min-height:100dvh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:1.5rem;text-align:center;}
    .billy{width:190px;height:190px;position:relative;}
    .billy img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
    .talk{opacity:0;} .billy.open .talk{opacity:1;} .billy.open .closed{opacity:0;}
    @keyframes breathe{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
    .billy{animation:breathe 4s ease-in-out infinite;}
    h1{color:var(--orange);font-size:1.25rem;margin:.2rem;}
    .live{font-size:.8rem;font-weight:700;color:var(--ok);background:#e8f7ee;padding:.3rem .8rem;border-radius:999px;}
    .live.off{color:var(--muted);background:#f0ece6;}
    button{border:none;background:linear-gradient(180deg,#ffb15c,var(--orange));color:#fff;font-size:1.1rem;
      font-weight:700;padding:1rem 1.8rem;border-radius:999px;cursor:pointer;box-shadow:0 10px 24px rgba(236,122,30,.4);}
    #self{position:fixed;bottom:1rem;right:1rem;width:96px;border-radius:12px;background:#000;transform:scaleX(-1);}
    .note{font-size:.8rem;color:var(--muted);max-width:34ch;line-height:1.5;}
  </style>
</head>
<body>
  <h1>La séance de Billy</h1>
  <span class="live off" id="live">non connecté</span>
  <figure class="billy" id="billy" style="margin:0">
    <img class="closed" src="/assets/billy.png" alt="Billy" />
    <img class="talk" src="/assets/billy-talk.png" alt="" aria-hidden="true" />
  </figure>
  <p id="msg" class="note">Un grand va lancer la séance. Appuie sur le bouton pour commencer.</p>
  <button id="startBtn">Commencer 🌰</button>
  <p class="note">Un adulte peut suivre la séance sur son téléphone (il ne peut pas intervenir).</p>
  <video id="self" autoplay playsinline muted></video>

  <script>
    const ICE = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };
    const params = new URLSearchParams(location.search);
    const token = params.get('room');
    const liveEl = document.getElementById('live');
    const msg = document.getElementById('msg');
    const billy = document.getElementById('billy');
    let ws, stream, pcs = new Map();

    document.getElementById('startBtn').addEventListener('click', start, { once: true });

    async function start() {
      if (!token) { msg.textContent = "Lien invalide (pas de salle)."; return; }
      document.getElementById('startBtn').style.display = 'none';
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: true });
        document.getElementById('self').srcObject = stream;
      } catch (e) { msg.textContent = "Pour la démo, autorise la caméra et le micro."; return; }
      msg.textContent = 'Coucou ! Je suis Billy 🌰';
      flap(); // petite animation de bouche (démo)

      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}/signal?room=${token}&role=broadcaster`);
      ws.onopen = () => { liveEl.textContent = 'prêt'; };
      ws.onmessage = async (ev) => {
        const m = JSON.parse(ev.data);
        if (m.type === 'peer-ready') startPeer(m.obsId);
        else if (m.type === 'answer') { const pc = pcs.get(m.from); if (pc) await pc.setRemoteDescription(m.answer); }
        else if (m.type === 'ice' && m.candidate) { const pc = pcs.get(m.from); if (pc) try { await pc.addIceCandidate(m.candidate); } catch {} }
        else if (m.type === 'peer-left' && m.obsId) { const pc = pcs.get(m.obsId); if (pc) { pc.close(); pcs.delete(m.obsId); } updateLive(); }
      };
    }

    async function startPeer(obsId) {
      const pc = new RTCPeerConnection(ICE);
      pcs.set(obsId, pc);
      for (const t of stream.getTracks()) pc.addTrack(t, stream);
      pc.onicecandidate = (e) => { if (e.candidate) sendWs({ type: 'ice', to: obsId, candidate: e.candidate }); };
      pc.onconnectionstatechange = updateLive;
      const offer = await pc.createOffer();
      await pc.setLocalDescription(offer);
      sendWs({ type: 'offer', to: obsId, offer });
    }
    function updateLive() {
      const n = [...pcs.values()].filter((p) => p.connectionState === 'connected').length;
      liveEl.textContent = n ? `● observé par ${n}` : 'prêt';
      liveEl.classList.toggle('off', n === 0);
    }
    function sendWs(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }
    function flap() { setInterval(() => billy.classList.toggle('open'), 220); }
  </script>
</body>
</html>
